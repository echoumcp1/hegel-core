[project]
name = "hegel"
version = "0.1.0"
description = "Prototype universal property-based testing implementation"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "click>=8.3.1",
    "hypothesis>=6.148.5",
    "hypothesis-jsonschema",
    "textual>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pyright]
extraPaths = ["src"]
reportExplicitAny = false
reportAny = false

[dependency-groups]
dev = [
    "pytest>=9.0.1",
    "pytest-asyncio>=0.24.0",
    "mypy>=1.19.0",
    "coverage",
    "ruff>=0.14.10",
]

[project.scripts]
hegel = "hegel.__main__:main"

[tool.ruff]
exclude = [
    "**/build/**",
    ".venv",
]

[tool.coverage.run]
branch = true
parallel = true
source = ["hegel"]

[tool.coverage.report]
exclude_also = [
    "raise AssertionError",
]
